<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gwanjong — AI Growth OS</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --purple: #bc8cff; --orange: #f0883e;
    --devto: #3b49df; --bluesky: #0085ff; --twitter: #1da1f2; --reddit: #ff4500;
    --github_discussions: #8957e5; --discourse: #e9573f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Nav */
  nav {
    display: flex; align-items: center; gap: 0;
    border-bottom: 1px solid var(--border); padding: 0 20px;
    position: sticky; top: 0; background: var(--bg); z-index: 100;
  }
  .nav-brand { font-size: 16px; font-weight: 700; padding: 12px 16px 12px 0; border-right: 1px solid var(--border); margin-right: 4px; }
  .nav-brand span { color: var(--accent); }
  .nav-tab {
    padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text2);
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-right { margin-left: auto; font-size: 11px; color: var(--text2); padding: 12px 0; }

  /* Layout */
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card h3 { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .empty { text-align: center; color: var(--text2); padding: 20px; font-size: 13px; }

  /* Indicators */
  .pi { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .pi.devto { background: var(--devto); } .pi.bluesky { background: var(--bluesky); }
  .pi.twitter { background: var(--twitter); } .pi.reddit { background: var(--reddit); }
  .pi.github_discussions { background: var(--github_discussions); } .pi.discourse { background: var(--discourse); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.active { background: #1f3a2e; color: var(--green); }
  .badge.paused { background: #3a2a1f; color: var(--yellow); }
  .badge.completed { background: #1f2a3a; color: var(--accent); }
  .badge.draft { background: #2a2a2a; color: var(--text2); }

  /* Buttons */
  .btn {
    border: 1px solid var(--border); background: transparent; color: var(--text);
    border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { background: #79c0ff; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red); color: #fff; }
  .btn.success { border-color: var(--green); color: var(--green); }
  .btn.success:hover { background: var(--green); color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Forms */
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
  .form-label { font-size: 12px; color: var(--text2); min-width: 90px; }
  .form-input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 6px 10px; font-size: 13px; flex: 1; min-width: 120px;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-input::placeholder { color: var(--text2); }
  select.form-input { min-width: 100px; }
  .form-check { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); cursor: pointer; }
  .form-check input { accent-color: var(--accent); }

  /* ── Overview tab ── */
  .totals { display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap; }
  .total-item { text-align: center; }
  .total-item .num { font-size: 28px; font-weight: 700; color: var(--accent); }
  .total-item .label { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { display: flex; align-items: center; font-size: 14px; }
  .stat-values { display: flex; gap: 12px; font-size: 13px; }
  .stat-values .today { color: var(--green); font-weight: 600; }
  .stat-values .week, .stat-values .total { color: var(--text2); }
  .rate-item { margin-bottom: 12px; }
  .rate-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .rate-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .rate-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .rate-fill.low { background: var(--green); } .rate-fill.mid { background: var(--yellow); } .rate-fill.high { background: var(--red); }
  .cooldown { font-size: 11px; margin-top: 3px; }
  .cooldown.active { color: var(--yellow); } .cooldown.ready { color: var(--green); }
  .chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; padding-top: 8px; }
  .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; }
  .chart-stack { width: 100%; max-width: 40px; margin-top: auto; display: flex; flex-direction: column-reverse; }
  .chart-seg { min-height: 0; transition: height 0.3s; }
  .chart-seg.devto { background: var(--devto); } .chart-seg.bluesky { background: var(--bluesky); }
  .chart-seg.twitter { background: var(--twitter); } .chart-seg.reddit { background: var(--reddit); }
  .chart-seg:first-child { border-radius: 0 0 3px 3px; } .chart-seg:last-child { border-radius: 3px 3px 0 0; }
  .chart-label { font-size: 10px; color: var(--text2); margin-top: 4px; }
  .chart-count { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
  .chart-legend { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: var(--text2); }
  .chart-legend span { display: flex; align-items: center; gap: 4px; }
  .eng-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .eng-row:last-child { border-bottom: none; }
  .eng-stats { display: flex; gap: 16px; font-size: 12px; }
  .eng-rate { font-weight: 700; font-size: 14px; }
  .eng-rate.good { color: var(--green); } .eng-rate.mid { color: var(--yellow); } .eng-rate.none { color: var(--text2); }
  .reply-item, .approval-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .reply-item:last-child, .approval-item:last-child { border-bottom: none; }
  .reply-header, .approval-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .reply-author { font-weight: 600; font-size: 13px; color: var(--accent); }
  .reply-time, .approval-meta { font-size: 11px; color: var(--text2); }
  .reply-body { font-size: 13px; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .tl-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .tl-item:last-child { border-bottom: none; }
  .tl-time { font-size: 11px; color: var(--text2); white-space: nowrap; min-width: 50px; }
  .tl-badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 11px; font-weight: 600; min-width: 56px; text-align: center; }
  .tl-badge.comment { background: #1f3a2e; color: var(--green); }
  .tl-badge.post { background: #2a1f3a; color: var(--purple); }
  .tl-badge.upvote { background: #3a2a1f; color: var(--orange); }
  .tl-content { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tl-content a { color: var(--text2); }

  /* ── Agent tab ── */
  .agent-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .agent-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; transition: border-color 0.15s; position: relative; }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card.running { border-color: var(--green); }
  .agent-avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 12px; background: var(--border); overflow: hidden; }
  .agent-avatar img { width: 100%; height: 100%; }
  .agent-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .agent-personality { font-size: 12px; color: var(--text2); margin-bottom: 8px; line-height: 1.4; min-height: 34px; }
  .agent-info { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .agent-status-dot { position: absolute; top: 16px; right: 16px; width: 10px; height: 10px; border-radius: 50%; }
  .agent-status-dot.running { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .agent-status-dot.idle { background: var(--text2); }
  .daemon-status { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .daemon-dot { width: 12px; height: 12px; border-radius: 50%; }
  .daemon-dot.running { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .daemon-dot.stopped { background: var(--red); }
  .daemon-label { font-size: 16px; font-weight: 600; }
  .daemon-pid { font-size: 12px; color: var(--text2); }
  .log-box {
    background: #010409; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    color: var(--text2); max-height: 400px; overflow-y: auto; line-height: 1.6;
  }
  .log-line { white-space: pre-wrap; word-break: break-all; }
  .log-line .err { color: var(--red); }
  .log-line .sys { color: var(--yellow); }

  /* ── Campaign tab ── */
  .camp-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; }
  .camp-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color 0.15s; }
  .camp-card:hover { border-color: var(--accent); }
  .camp-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .camp-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .camp-obj { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .camp-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .camp-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--border); color: var(--text2); }
  .camp-kpi { display: flex; gap: 16px; flex-wrap: wrap; }
  .kpi-item { text-align: center; }
  .kpi-num { font-size: 20px; font-weight: 700; }
  .kpi-label { font-size: 10px; color: var(--text2); }
  .kpi-prog { font-size: 11px; }
  .kpi-prog.on-track { color: var(--green); }
  .kpi-prog.behind { color: var(--yellow); }
  .kpi-prog.critical { color: var(--red); }

  .report-section { margin-top: 16px; }
  .report-section h4 { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .report-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .report-bar-label { font-size: 12px; min-width: 70px; }
  .report-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .report-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.3s; }
  .report-bar-val { font-size: 12px; color: var(--text2); min-width: 30px; text-align: right; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
    justify-content: center; align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; margin-bottom: 16px; }
  .modal .form-row { margin-bottom: 12px; }

  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .totals { gap: 16px; } .camp-list { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <div class="nav-brand"><span>gwanjong</span> OS</div>
  <div class="nav-tab active" data-tab="overview">현황판</div>
  <div class="nav-tab" data-tab="daemon">에이전트</div>
  <div class="nav-tab" data-tab="campaigns">캠페인</div>
  <div class="nav-right"><span id="updated-at">로딩 중...</span></div>
</nav>

<div class="container">

<!-- ══ 현황판 탭 ══ -->
<div class="tab-content active" id="tab-overview">
  <div class="totals" id="totals"></div>
  <div class="grid">
    <div class="card"><h3>플랫폼 활동</h3><div id="platform-stats"></div></div>
    <div class="card"><h3>일일 한도</h3><div id="rate-limits"></div></div>
    <div class="card"><h3>참여율</h3><div id="engagement"></div></div>
  </div>
  <div class="grid">
    <div class="card"><h3>주간 활동</h3><div class="chart" id="weekly-chart"></div><div class="chart-legend" id="chart-legend"></div></div>
    <div class="card"><h3>미답변 답글</h3><div id="pending-replies"></div></div>
  </div>
  <div class="card" style="margin-bottom:20px"><h3>승인 대기 <span id="approval-bulk-btns" style="float:right;display:none"><button class="btn success" onclick="approvalBulk('approve')" style="padding:2px 10px;font-size:11px">전체 승인</button> <button class="btn danger" onclick="approvalBulk('reject')" style="padding:2px 10px;font-size:11px">전체 거부</button></span></h3><div id="pending-approvals"></div>
    <div id="failed-approvals-wrap" style="display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleFailed()">
        <span style="font-size:11px;color:var(--text2)" id="failed-toggle-label">실패 0건</span>
        <span style="font-size:11px;color:var(--text2)" id="failed-toggle-btn">펼치기</span>
      </div>
      <div id="failed-approvals" style="display:none"></div>
    </div>
  </div>
  <div class="card"><h3>최근 활동</h3><div id="timeline"></div></div>
</div>

<!-- ══ 에이전트 탭 ══ -->
<div class="tab-content" id="tab-daemon">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
    <h2 style="font-size:18px;">내 팀원들</h2>
    <button class="btn primary" onclick="showCreateAgent()">+ 팀원 추가</button>
  </div>
  <div class="agent-grid" id="agent-list"><div class="empty">로딩 중...</div></div>
  <div id="agent-detail" style="margin-top:16px"></div>
</div>

<!-- ══ 캠페인 탭 ══ -->
<div class="tab-content" id="tab-campaigns">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
    <h2 style="font-size:18px;">캠페인</h2>
    <button class="btn primary" onclick="showCreateCampaign()">+ 새 캠페인</button>
  </div>
  <div class="camp-list" id="campaign-list"><div class="empty">로딩 중...</div></div>
  <div id="campaign-report" style="margin-top:20px"></div>
</div>

</div><!-- /container -->

<!-- ══ 모달 ══ -->

<!-- 팀원 추가 모달 -->
<div class="modal-overlay" id="modal-agent">
  <div class="modal">
    <h2>팀원 추가</h2>
    <div style="text-align:center;margin-bottom:16px">
      <div class="agent-avatar" style="margin:0 auto"><img id="a-preview" src="https://api.dicebear.com/9.x/bottts-neutral/svg?seed=new&backgroundColor=1a1a2e"></div>
    </div>
    <div class="form-row"><span class="form-label">이름</span><input class="form-input" id="a-name" placeholder="준혁" oninput="previewAvatar()"></div>
    <div class="form-row"><span class="form-label">캐릭터 스타일</span>
      <select class="form-input" id="a-style" onchange="previewAvatar()">
        <option value="bottts-neutral">로봇</option>
        <option value="fun-emoji">이모지</option>
        <option value="pixel-art">픽셀</option>
        <option value="adventurer">모험가</option>
        <option value="thumbs">엄지</option>
        <option value="icons">아이콘</option>
      </select>
    </div>
    <div class="form-row"><span class="form-label">성격</span><input class="form-input" id="a-personality" placeholder="기술 깊이 있고 유머있는 시니어 개발자"></div>
    <div class="form-row"><span class="form-label">담당 토픽</span><input class="form-input" id="a-topics" value="MCP,LLM" placeholder="쉼표 구분"></div>
    <div class="form-row" style="align-items:flex-start"><span class="form-label" style="margin-top:4px">담당 플랫폼</span>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <label class="form-check"><input type="checkbox" name="a-platform" value="devto" checked><span class="pi devto"></span>Dev.to</label>
        <label class="form-check"><input type="checkbox" name="a-platform" value="bluesky"><span class="pi bluesky"></span>Bluesky</label>
        <label class="form-check"><input type="checkbox" name="a-platform" value="twitter"><span class="pi twitter"></span>Twitter</label>
        <label class="form-check"><input type="checkbox" name="a-platform" value="reddit"><span class="pi reddit"></span>Reddit</label>
        <label class="form-check"><input type="checkbox" name="a-platform" value="github_discussions"><span class="pi github_discussions"></span>GitHub</label>
        <label class="form-check"><input type="checkbox" name="a-platform" value="discourse"><span class="pi discourse"></span>Discourse</label>
      </div>
    </div>
    <div class="form-row"><span class="form-label">말투</span>
      <select class="form-input" id="a-tone">
        <option value="casual-professional">캐주얼 프로</option>
        <option value="conversational">대화형</option>
        <option value="punchy">펀치라인</option>
        <option value="blunt-helpful">직설 도움형</option>
        <option value="technical-collaborative">기술 협업형</option>
      </select>
    </div>
    <div class="form-row" style="gap:16px">
      <label class="form-check"><input type="checkbox" id="a-approval" checked> 승인 필요</label>
      <label class="form-check"><input type="checkbox" id="a-dry-run"> 테스트 모드</label>
    </div>
    <div class="btn-group" style="margin-top:16px; justify-content:flex-end">
      <button class="btn" onclick="closeModal('modal-agent')">취소</button>
      <button class="btn primary" onclick="createAgent()">추가</button>
    </div>
  </div>
</div>

<!-- 캠페인 생성 모달 -->
<div class="modal-overlay" id="modal-campaign">
  <div class="modal">
    <h2>새 캠페인 만들기</h2>
    <div class="form-row"><span class="form-label">이름</span><input class="form-input" id="c-name" placeholder="MCP Launch Q1"></div>
    <div class="form-row"><span class="form-label">목표</span>
      <select class="form-input" id="c-objective"><option value="awareness">인지도</option><option value="engagement">참여</option><option value="conversion">전환</option></select>
    </div>
    <div class="form-row"><span class="form-label">토픽</span><input class="form-input" id="c-topics" placeholder="MCP, LLM (쉼표 구분)"></div>
    <div class="form-row"><span class="form-label">플랫폼</span><input class="form-input" id="c-platforms" placeholder="devto, twitter"></div>
    <div class="form-row"><span class="form-label">타깃 고객</span><input class="form-input" id="c-icp" placeholder="AI 도구를 만드는 백엔드 개발자"></div>
    <div class="form-row"><span class="form-label">CTA</span><input class="form-input" id="c-cta" placeholder="graph-tool-call 써보기"></div>
    <div class="form-row"><span class="form-label">KPI 목표</span><input class="form-input" id="c-kpi" placeholder='{"comments": 50, "posts": 10}'></div>
    <div class="btn-group" style="margin-top:16px; justify-content:flex-end">
      <button class="btn" onclick="closeModal('modal-campaign')">취소</button>
      <button class="btn primary" onclick="createCampaign()">생성</button>
    </div>
  </div>
</div>

<!-- 팀원 수정 모달 -->
<div class="modal-overlay" id="modal-edit-agent">
  <div class="modal">
    <h2>팀원 수정</h2>
    <input type="hidden" id="e-id">
    <div style="text-align:center;margin-bottom:16px">
      <div class="agent-avatar" style="margin:0 auto"><img id="e-preview" src=""></div>
    </div>
    <div class="form-row"><span class="form-label">이름</span><input class="form-input" id="e-name" oninput="previewEditAvatar()"></div>
    <div class="form-row"><span class="form-label">캐릭터 스타일</span>
      <select class="form-input" id="e-style" onchange="previewEditAvatar()">
        <option value="bottts-neutral">로봇</option>
        <option value="fun-emoji">이모지</option>
        <option value="pixel-art">픽셀</option>
        <option value="adventurer">모험가</option>
        <option value="thumbs">엄지</option>
        <option value="icons">아이콘</option>
      </select>
    </div>
    <div class="form-row"><span class="form-label">성격</span><input class="form-input" id="e-personality"></div>
    <div class="form-row"><span class="form-label">담당 토픽</span><input class="form-input" id="e-topics"></div>
    <div class="form-row" style="align-items:flex-start"><span class="form-label" style="margin-top:4px">담당 플랫폼</span>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <label class="form-check"><input type="checkbox" name="e-platform" value="devto"><span class="pi devto"></span>Dev.to</label>
        <label class="form-check"><input type="checkbox" name="e-platform" value="bluesky"><span class="pi bluesky"></span>Bluesky</label>
        <label class="form-check"><input type="checkbox" name="e-platform" value="twitter"><span class="pi twitter"></span>Twitter</label>
        <label class="form-check"><input type="checkbox" name="e-platform" value="reddit"><span class="pi reddit"></span>Reddit</label>
        <label class="form-check"><input type="checkbox" name="e-platform" value="github_discussions"><span class="pi github_discussions"></span>GitHub</label>
        <label class="form-check"><input type="checkbox" name="e-platform" value="discourse"><span class="pi discourse"></span>Discourse</label>
      </div>
    </div>
    <div class="form-row"><span class="form-label">말투</span>
      <select class="form-input" id="e-tone">
        <option value="casual-professional">캐주얼 프로</option>
        <option value="conversational">대화형</option>
        <option value="punchy">펀치라인</option>
        <option value="blunt-helpful">직설 도움형</option>
        <option value="technical-collaborative">기술 협업형</option>
      </select>
    </div>
    <div class="form-row" style="gap:16px">
      <label class="form-check"><input type="checkbox" id="e-approval"> 승인 필요</label>
      <label class="form-check"><input type="checkbox" id="e-dry-run"> 테스트 모드</label>
    </div>
    <div class="btn-group" style="margin-top:16px; justify-content:flex-end">
      <button class="btn" onclick="closeModal('modal-edit-agent')">취소</button>
      <button class="btn primary" onclick="saveEditAgent()">저장</button>
    </div>
  </div>
</div>

<script>
const REFRESH = 30000;
const PCOLORS = {devto:'#3b49df', bluesky:'#0085ff', twitter:'#1da1f2', reddit:'#ff4500', github_discussions:'#8957e5', discourse:'#e9573f'};
const PNAMES = Object.keys(PCOLORS);
const ACTION_KO = {comment:'댓글', post:'포스트', upvote:'추천'};
const OBJ_KO = {awareness:'인지도', engagement:'참여', conversion:'전환'};
const STATUS_KO = {active:'진행중', paused:'일시정지', completed:'완료', draft:'초안', pending:'대기', failed:'실패'};

// ── Tab Navigation ──
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'daemon') refreshAgents();
    if (tab.dataset.tab === 'campaigns') refreshCampaigns();
  });
});

// ── Modal ──
function showModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ── 현황판 ──
async function fetchSummary() {
  try { const r = await fetch('/api/summary'); renderOverview(await r.json()); } catch(e) { console.error(e); }
}

function renderOverview(d) {
  document.getElementById('updated-at').textContent = '갱신: ' + new Date(d.generated_at).toLocaleTimeString('ko-KR');
  renderTotals(d.totals);
  renderPlatformStats(d.platforms);
  renderRateLimits(d.rate_limits);
  renderWeeklyChart(d.weekly_chart);
  renderEngagement(d.engagement);
  renderPendingReplies(d.pending_replies);
  renderPendingApprovals(d.pending_approvals, d.failed_approvals, d.approval_stats);
  renderTimeline(d.recent_activity);
}

function renderTotals(t) {
  document.getElementById('totals').innerHTML = [
    ['total_actions','총 활동'], ['total_seen_posts','탐색한 글'], ['total_replies','받은 답글'],
    ['pending_replies','미답변'], ['pending_approvals','승인 대기']
  ].map(([k,l]) => `<div class="total-item"><div class="num">${t[k]||0}</div><div class="label">${l}</div></div>`).join('');
}

function renderPlatformStats(platforms) {
  document.getElementById('platform-stats').innerHTML = platforms.map(p => `
    <div class="stat-row">
      <div class="stat-label"><span class="pi ${p.platform}"></span>${p.platform}</div>
      <div class="stat-values"><span class="today">오늘 ${p.today}</span><span class="week">주간 ${p.week}</span><span class="total" style="font-size:12px">총 ${p.total}</span></div>
    </div>`).join('');
}

function renderRateLimits(limits) {
  document.getElementById('rate-limits').innerHTML = limits.map(l => {
    const pct = l.comments.max > 0 ? (l.comments.used / l.comments.max * 100) : 0;
    const cls = pct >= 80 ? 'high' : pct >= 50 ? 'mid' : 'low';
    const cd = l.in_cooldown ? `<div class="cooldown active">대기 중 ${Math.ceil(l.cooldown_remaining_min)}분</div>` : '';
    return `<div class="rate-item">
      <div class="rate-header"><span><span class="pi ${l.platform}"></span>${l.platform}</span><span>댓글 ${l.comments.used}/${l.comments.max}</span></div>
      <div class="rate-bar"><div class="rate-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>${cd}</div>`;
  }).join('');
}

function renderWeeklyChart(chart) {
  const el = document.getElementById('weekly-chart');
  const max = Math.max(...chart.map(d => d.total), 1);
  el.innerHTML = chart.map(d => {
    const h = Math.max((d.total / max) * 70, d.total > 0 ? 4 : 2);
    const segs = PNAMES.map(p => d[p] ? `<div class="chart-seg ${p}" style="height:${(d[p]/d.total)*h}px" title="${p}: ${d[p]}건"></div>` : '').join('');
    return `<div class="chart-col"><div class="chart-count">${d.total||''}</div><div class="chart-stack" style="height:${h}px">${segs}</div><div class="chart-label">${d.date.slice(5)}</div></div>`;
  }).join('');
  document.getElementById('chart-legend').innerHTML = PNAMES.map(p => `<span><span class="pi ${p}"></span>${p}</span>`).join('');
}

function renderEngagement(eng) {
  const el = document.getElementById('engagement');
  if (!eng?.length) { el.innerHTML = '<div class="empty">데이터 없음</div>'; return; }
  el.innerHTML = eng.map(e => {
    const cls = e.reply_rate > 20 ? 'good' : e.reply_rate > 0 ? 'mid' : 'none';
    return `<div class="eng-row"><div style="display:flex;align-items:center"><span class="pi ${e.platform}"></span>${e.platform}</div>
      <div class="eng-stats"><span style="color:var(--text2)">${e.comments_sent}건 발송</span><span style="color:var(--text2)">${e.replies_received}건 답글</span><span class="eng-rate ${cls}">${e.reply_rate}%</span></div></div>`;
  }).join('');
}

function renderPendingReplies(replies) {
  const el = document.getElementById('pending-replies');
  if (!replies.length) { el.innerHTML = '<div class="empty">미답변 답글 없음</div>'; return; }
  el.innerHTML = replies.slice(0,5).map(r => `<div class="reply-item">
    <div class="reply-header"><span class="reply-author"><span class="pi ${r.platform}"></span>@${r.author}</span><span class="reply-time">${timeAgo(r.detected_at)}</span></div>
    <div class="reply-body">${esc(stripHtml(r.body))}</div></div>`).join('');
}

function renderPendingApprovals(approvals, failed, stats) {
  const el = document.getElementById('pending-approvals');
  const failedEl = document.getElementById('failed-approvals');
  const failedWrap = document.getElementById('failed-approvals-wrap');
  const failedLabel = document.getElementById('failed-toggle-label');

  const bulkBtns = document.getElementById('approval-bulk-btns');
  if (!approvals.length) {
    el.innerHTML = '<div class="empty">승인 대기 항목 없음</div>';
    if (bulkBtns) bulkBtns.style.display = 'none';
  } else {
    if (bulkBtns) bulkBtns.style.display = 'inline';
    el.innerHTML = approvals.slice(0,10).map(a => `<div class="approval-item">
      <div class="approval-header"><span style="font-size:13px;font-weight:600">${esc(a.title)}</span><span style="color:var(--yellow);font-size:11px">대기</span></div>
      <div class="approval-meta"><span class="pi ${a.platform}"></span>${a.platform} · ${ACTION_KO[a.action]||a.action} · ${timeAgo(a.created_at)}</div>
      ${a.post_url ? `<a href="${a.post_url}" target="_blank" style="font-size:11px;display:block;margin-top:4px;color:var(--accent)">${trunc(a.post_url,60)} ↗</a>` : ''}
      ${a.content ? `<div style="font-size:12px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;margin-top:6px;line-height:1.5;white-space:pre-wrap">${esc(a.content)}</div>` : ''}
      <div class="btn-group" style="margin-top:8px">
        <button class="btn success" onclick="approvalAction(${a.id},'approve')" style="padding:3px 10px;font-size:11px">승인</button>
        <button class="btn danger" onclick="approvalAction(${a.id},'reject')" style="padding:3px 10px;font-size:11px">거부</button>
      </div></div>`).join('');
  }

  // 실패 항목은 접힌 상태로
  const failedItems = (failed||[]);
  if (!failedItems.length) {
    failedWrap.style.display = 'none';
    return;
  }
  failedWrap.style.display = 'block';
  failedLabel.textContent = `재시도 대기 ${failedItems.length}건 (자동 재시도됨)`;
  failedEl.innerHTML = failedItems.slice(0,5).map(a => `<div class="approval-item">
    <div class="approval-header"><span style="font-size:12px;font-weight:600;color:var(--text2)">${esc(a.title)}</span></div>
    <div style="font-size:11px;color:var(--text2);margin-top:2px">${esc(trunc(a.last_error||'',60))}</div>
    <div class="btn-group" style="margin-top:6px">
      <button class="btn" onclick="approvalAction(${a.id},'retry')" style="padding:2px 8px;font-size:11px">재시도</button>
      <button class="btn danger" onclick="approvalAction(${a.id},'reject')" style="padding:2px 8px;font-size:11px">삭제</button>
    </div></div>`).join('');
}

let _failedVisible = false;
function toggleFailed() {
  _failedVisible = !_failedVisible;
  document.getElementById('failed-approvals').style.display = _failedVisible ? 'block' : 'none';
  document.getElementById('failed-toggle-btn').textContent = _failedVisible ? '접기' : '펼치기';
}

function renderTimeline(activity) {
  const el = document.getElementById('timeline');
  if (!activity.length) { el.innerHTML = '<div class="empty">활동 기록 없음</div>'; return; }
  el.innerHTML = activity.slice(0,20).map(a => `<div class="tl-item" style="flex-wrap:wrap">
    <span class="tl-time">${timeAgo(a.timestamp)}</span><span class="pi ${a.platform}"></span>
    <span class="tl-badge ${a.action}">${ACTION_KO[a.action]||a.action}</span>
    <div class="tl-content" style="white-space:normal;-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden">${a.content ? esc(a.content) : ''}${a.post_url ? ` <a href="${a.post_url}" target="_blank" style="white-space:nowrap">링크 ↗</a>` : ''}</div></div>`).join('');
}

async function approvalAction(id, action) {
  try { await fetch(`/api/approvals/${id}/${action}`, {method:'POST'}); fetchSummary(); } catch(e) { alert(e); }
}

async function approvalBulk(action) {
  const label = action === 'approve' ? '승인' : '거부';
  if (!confirm(`대기 중인 항목을 전체 ${label}할까요?`)) return;
  try {
    const r = await fetch('/api/summary');
    const d = await r.json();
    const items = d.pending_approvals || [];
    for (const a of items) {
      await fetch(`/api/approvals/${a.id}/${action}`, {method:'POST'});
    }
    fetchSummary();
  } catch(e) { alert(e); }
}

// ── 에이전트 (팀원) ──
const TONE_KO = {'casual-professional':'캐주얼 프로','conversational':'대화형','punchy':'펀치라인','blunt-helpful':'직설 도움형','technical-collaborative':'기술 협업형'};
let _selectedAgent = null;

function avatarUrl(style, seed) {
  return `https://api.dicebear.com/9.x/${style||'bottts-neutral'}/svg?seed=${encodeURIComponent(seed||'default')}&backgroundColor=1a1a2e`;
}
function previewAvatar() {
  const name = document.getElementById('a-name').value || 'new';
  const style = document.getElementById('a-style').value;
  document.getElementById('a-preview').src = avatarUrl(style, name);
}
function showCreateAgent() { showModal('modal-agent'); previewAvatar(); }

async function createAgent() {
  const data = {
    name: document.getElementById('a-name').value,
    avatar_style: document.getElementById('a-style').value,
    avatar_seed: document.getElementById('a-name').value,
    personality: document.getElementById('a-personality').value,
    topics: document.getElementById('a-topics').value.split(',').map(s=>s.trim()).filter(Boolean),
    platforms: [...document.querySelectorAll('input[name="a-platform"]:checked')].map(c=>c.value),
    tone: document.getElementById('a-tone').value,
    require_approval: document.getElementById('a-approval').checked,
    dry_run: document.getElementById('a-dry-run').checked,
  };
  closeModal('modal-agent');
  try {
    await fetch('/api/agents', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
    refreshAgents();
  } catch(e) { alert(e); }
}

async function refreshAgents() {
  try {
    const r = await fetch('/api/agents');
    const d = await r.json();
    const el = document.getElementById('agent-list');
    if (!d.agents.length) { el.innerHTML = '<div class="empty">아직 팀원이 없어요. 팀원을 추가해보세요!</div>'; return; }
    el.innerHTML = d.agents.map(a => {
      const topics = JSON.parse(a.topics_json || '[]');
      const platforms = JSON.parse(a.platforms_json || '[]');
      const isRunning = a.running;
      return `<div class="agent-card${isRunning?' running':''}" onclick="selectAgent('${a.id}')">
        <div class="agent-status-dot ${isRunning?'running':'idle'}"></div>
        <div class="agent-avatar"><img src="${avatarUrl(a.avatar_style, a.avatar_seed)}"></div>
        <div class="agent-name">${esc(a.name)}</div>
        <div class="agent-personality">${esc(a.personality || '성격 미설정')}</div>
        <div class="agent-info">
          ${platforms.map(p=>`<span class="camp-tag"><span class="pi ${p}"></span>${p}</span>`).join('')}
          ${topics.map(t=>`<span class="camp-tag">${esc(t)}</span>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:8px">${TONE_KO[a.tone]||a.tone}${a.require_approval ? '' : ' · <span style="color:var(--green)">자율</span>'}${a.dry_run ? ' · <span style="color:var(--yellow)">테스트</span>' : ''}</div>
        ${a.stats ? `<div style="display:flex;justify-content:center;gap:16px;margin-bottom:10px">
          <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--green)">${a.stats.today}</div><div style="font-size:10px;color:var(--text2)">오늘</div></div>
          <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--accent)">${a.stats.week}</div><div style="font-size:10px;color:var(--text2)">주간</div></div>
          <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--text2)">${a.stats.total}</div><div style="font-size:10px;color:var(--text2)">누적</div></div>
        </div>` : ''}
        <div class="btn-group" style="justify-content:center">
          ${isRunning
            ? `<button class="btn danger" onclick="event.stopPropagation();agentStop('${a.id}')" style="font-size:11px;padding:4px 12px">정지</button>`
            : `<button class="btn success" onclick="event.stopPropagation();agentStart('${a.id}')" style="font-size:11px;padding:4px 12px">출근</button>`}
          <button class="btn" onclick="event.stopPropagation();showEditAgent('${a.id}')" style="font-size:11px;padding:4px 12px">수정</button>
          <button class="btn danger" onclick="event.stopPropagation();agentDelete('${a.id}','${esc(a.name)}')" style="font-size:11px;padding:4px 12px">해고</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

async function selectAgent(id) {
  _selectedAgent = id;
  try {
    const r = await fetch(`/api/agents/${id}/logs`);
    const d = await r.json();
    const el = document.getElementById('agent-detail');
    if (!d.logs.length) { el.innerHTML = '<div class="card"><h3>로그</h3><div class="empty">로그 없음</div></div>'; return; }
    el.innerHTML = `<div class="card"><h3>로그 <button class="btn" onclick="selectAgent('${id}')" style="float:right;padding:2px 8px;font-size:11px">새로고침</button></h3>
      <div class="log-box">${d.logs.map(line => {
        const cls = line.includes('[err]') ? 'err' : line.includes('[sys]') ? 'sys' : '';
        return `<div class="log-line${cls ? ' '+cls : ''}">${esc(line)}</div>`;
      }).join('')}</div></div>`;
  } catch(e) { console.error(e); }
}

async function agentStart(id) {
  try {
    const r = await fetch(`/api/agents/${id}/start`, {method:'POST'});
    const d = await r.json();
    if (d.error) alert(d.error);
    refreshAgents();
  } catch(e) { alert(e); }
}

async function agentStop(id) {
  try {
    await fetch(`/api/agents/${id}/stop`, {method:'POST'});
    refreshAgents();
  } catch(e) { alert(e); }
}

function previewEditAvatar() {
  const name = document.getElementById('e-name').value || 'edit';
  const style = document.getElementById('e-style').value;
  document.getElementById('e-preview').src = avatarUrl(style, name);
}

async function showEditAgent(id) {
  try {
    const r = await fetch('/api/agents');
    const d = await r.json();
    const agent = d.agents.find(a => a.id === id);
    if (!agent) return;

    document.getElementById('e-id').value = id;
    document.getElementById('e-name').value = agent.name;
    document.getElementById('e-style').value = agent.avatar_style;
    document.getElementById('e-personality').value = agent.personality || '';
    document.getElementById('e-topics').value = JSON.parse(agent.topics_json || '[]').join(', ');
    document.getElementById('e-tone').value = agent.tone;
    document.getElementById('e-approval').checked = !!agent.require_approval;
    document.getElementById('e-dry-run').checked = !!agent.dry_run;

    // 플랫폼 체크박스
    const platforms = JSON.parse(agent.platforms_json || '[]');
    document.querySelectorAll('input[name="e-platform"]').forEach(cb => {
      cb.checked = platforms.includes(cb.value);
    });

    previewEditAvatar();
    showModal('modal-edit-agent');
  } catch(e) { console.error(e); }
}

async function saveEditAgent() {
  const id = document.getElementById('e-id').value;
  const data = {
    name: document.getElementById('e-name').value,
    avatar_style: document.getElementById('e-style').value,
    avatar_seed: document.getElementById('e-name').value,
    personality: document.getElementById('e-personality').value,
    topics: document.getElementById('e-topics').value.split(',').map(s=>s.trim()).filter(Boolean),
    platforms: [...document.querySelectorAll('input[name="e-platform"]:checked')].map(c=>c.value),
    tone: document.getElementById('e-tone').value,
    require_approval: document.getElementById('e-approval').checked ? 1 : 0,
    dry_run: document.getElementById('e-dry-run').checked ? 1 : 0,
  };
  closeModal('modal-edit-agent');
  try {
    await fetch(`/api/agents/${id}`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
    refreshAgents();
  } catch(e) { alert(e); }
}

async function agentDelete(id, name) {
  if (!confirm(`${name}을(를) 정말 해고할까요?`)) return;
  try {
    await fetch(`/api/agents/${id}`, {method:'DELETE'});
    document.getElementById('agent-detail').innerHTML = '';
    refreshAgents();
  } catch(e) { alert(e); }
}

// ── 캠페인 ──
let _selectedCampaign = null;

function showCreateCampaign() { showModal('modal-campaign'); }

async function createCampaign() {
  let kpi = {};
  try { kpi = JSON.parse(document.getElementById('c-kpi').value || '{}'); } catch(e) {}
  const data = {
    name: document.getElementById('c-name').value,
    objective: document.getElementById('c-objective').value,
    topics: document.getElementById('c-topics').value.split(',').map(s=>s.trim()).filter(Boolean),
    platforms: document.getElementById('c-platforms').value.split(',').map(s=>s.trim()).filter(Boolean),
    icp: document.getElementById('c-icp').value,
    cta: document.getElementById('c-cta').value,
    kpi_target: kpi,
  };
  closeModal('modal-campaign');
  try {
    await fetch('/api/campaigns', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
    refreshCampaigns();
  } catch(e) { alert(e); }
}

async function refreshCampaigns() {
  try {
    const r = await fetch('/api/campaigns');
    const d = await r.json();
    const el = document.getElementById('campaign-list');
    if (!d.campaigns.length) { el.innerHTML = '<div class="empty">캠페인이 없습니다. 새 캠페인을 만들어보세요!</div>'; return; }
    el.innerHTML = d.campaigns.map(c => {
      const topics = JSON.parse(c.topics_json || '[]');
      const platforms = JSON.parse(c.platforms_json || '[]');
      return `<div class="camp-card${_selectedCampaign===c.id?' selected':''}" onclick="selectCampaign('${c.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="camp-name">${esc(c.name)}</div><span class="badge ${c.status}">${STATUS_KO[c.status]||c.status}</span>
        </div>
        <div class="camp-obj">${OBJ_KO[c.objective]||c.objective}${c.icp ? ' · '+esc(c.icp) : ''}</div>
        <div class="camp-tags">${topics.map(t=>`<span class="camp-tag">${esc(t)}</span>`).join('')}${platforms.map(p=>`<span class="camp-tag"><span class="pi ${p}"></span>${p}</span>`).join('')}</div>
        <div style="font-size:11px;color:var(--text2)">${c.start_date || ''} ${c.end_date ? '→ '+c.end_date : ''}</div>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

async function selectCampaign(id) {
  _selectedCampaign = id;
  document.querySelectorAll('.camp-card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  try {
    const r = await fetch(`/api/campaigns/${id}/report`);
    const report = await r.json();
    renderCampaignReport(report);
  } catch(e) { console.error(e); }
}

function renderCampaignReport(r) {
  const el = document.getElementById('campaign-report');
  if (r.error) { el.innerHTML = `<div class="card"><div class="empty">${esc(r.error)}</div></div>`; return; }

  const c = r.campaign || {};
  const kpi = r.kpi_progress || {};
  const byPlatform = r.by_platform || {};
  const byAction = r.by_action || {};
  const maxPlatform = Math.max(...Object.values(byPlatform), 1);
  const maxAction = Math.max(...Object.values(byAction), 1);

  const KPI_KO = {comments:'댓글', posts:'포스트', conversions:'전환'};

  el.innerHTML = `<div class="card">
    <h3>리포트: ${esc(c.name || '')}</h3>
    <div class="totals" style="margin-bottom:16px">
      <div class="total-item"><div class="num">${r.total_actions}</div><div class="label">총 활동</div></div>
      <div class="total-item"><div class="num">${r.total_conversions}</div><div class="label">전환</div></div>
    </div>

    ${Object.keys(kpi).length ? `<div class="report-section"><h4>KPI 달성률</h4>
      <div class="camp-kpi">${Object.entries(kpi).map(([k,v]) => {
        const pct = v.progress || 0;
        const cls = pct >= 80 ? 'on-track' : pct >= 40 ? 'behind' : 'critical';
        return `<div class="kpi-item"><div class="kpi-num">${v.actual}</div><div class="kpi-label">${KPI_KO[k]||k}</div><div class="kpi-prog ${cls}">${pct}% (목표 ${v.target})</div></div>`;
      }).join('')}</div></div>` : ''}

    <div class="report-section"><h4>플랫폼별</h4>
      ${Object.entries(byPlatform).map(([p,n]) => `<div class="report-bar-row">
        <span class="report-bar-label"><span class="pi ${p}"></span>${p}</span>
        <div class="report-bar"><div class="report-bar-fill" style="width:${(n/maxPlatform)*100}%"></div></div>
        <span class="report-bar-val">${n}건</span></div>`).join('') || '<div class="empty">데이터 없음</div>'}
    </div>

    <div class="report-section"><h4>활동 유형별</h4>
      ${Object.entries(byAction).map(([a,n]) => `<div class="report-bar-row">
        <span class="report-bar-label"><span class="tl-badge ${a}" style="min-width:auto">${ACTION_KO[a]||a}</span></span>
        <div class="report-bar"><div class="report-bar-fill" style="width:${(n/maxAction)*100}%"></div></div>
        <span class="report-bar-val">${n}건</span></div>`).join('') || '<div class="empty">데이터 없음</div>'}
    </div>

    ${r.total_conversions > 0 ? `<div class="report-section"><h4>전환 유형별</h4>
      ${Object.entries(r.conversions_by_type||{}).map(([t,n]) => `<div style="font-size:13px;margin-bottom:4px">${t}: <strong>${n}건</strong></div>`).join('')}</div>` : ''}
  </div>`;
}

// ── Utils ──
function timeAgo(s) {
  if(!s) return '';
  const m = Math.floor((Date.now()-new Date(s).getTime())/60000);
  if(m<1) return '방금';
  if(m<60) return m+'분 전';
  const h = Math.floor(m/60);
  if(h<24) return h+'시간 전';
  const d = Math.floor(h/24);
  if(d<7) return d+'일 전';
  return Math.floor(d/7)+'주 전';
}
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function stripHtml(s) { const d=document.createElement('div'); d.innerHTML=s; return d.textContent||''; }
function trunc(s,n) { return s&&s.length>n?s.slice(0,n)+'…':(s||''); }

// ── Init ──
fetchSummary();
setInterval(fetchSummary, REFRESH);
setInterval(() => {
  if (document.querySelector('[data-tab="daemon"].active')) refreshAgents();
}, 10000);
</script>
