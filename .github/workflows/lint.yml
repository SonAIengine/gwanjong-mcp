name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "devhub-social[all] @ git+https://github.com/SonAIengine/devhub-social.git"
          pip install "mcp-pipeline @ git+https://github.com/SonAIengine/mcp-pipeline.git"
          pip install -e ".[all,dev]"
          pip install aiohttp async_lru oauthlib

      - name: Ruff check
        run: ruff check gwanjong_mcp/

      - name: Ruff format check
        run: ruff format --check gwanjong_mcp/
